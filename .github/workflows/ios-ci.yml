name: iOS Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: xcodebuild -version
      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project pump_app.xcodeproj -scheme pump_app
      - name: Build app
        run: |
          set -o pipefail
          xcodebuild build \
            -project pump_app.xcodeproj \
            -scheme pump_app \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            CODE_SIGNING_ALLOWED=NO
